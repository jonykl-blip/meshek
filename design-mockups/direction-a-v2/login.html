<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adama v2 — Login | משק פיצביץ׳</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== DESIGN TOKENS ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F8F5F0;
      --fg: #251F19;
      --primary: #5B7A2F;
      --primary-dark: #4A6526;
      --primary-light: #6B8C3E;
      --accent: #D9793A;
      --accent-brown: #8B6914;
      --secondary: #EDE8E0;
      --muted: #7A7168;
      --border: #DDD6CC;
      --sidebar-top: #3A5420;
      --sidebar-bottom: #2E4318;
      --card: #FFFDF9;
      --shadow-sm: 0 1px 3px rgba(37,31,25,0.04);
      --shadow-md: 0 4px 16px rgba(37,31,25,0.06), 0 1px 3px rgba(37,31,25,0.04);
      --shadow-lg: 0 8px 40px rgba(37,31,25,0.08), 0 2px 6px rgba(37,31,25,0.04);
      --shadow-xl: 0 16px 56px rgba(37,31,25,0.12), 0 4px 12px rgba(37,31,25,0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== DIRECTION BAR ===== */
    .direction-bar {
      background: linear-gradient(135deg, var(--sidebar-top), var(--sidebar-bottom));
      color: #fff;
      padding: 16px 40px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(37,31,25,0.15);
    }
    .direction-bar h1 { font-size: 1.3rem; font-weight: 700; direction: ltr; letter-spacing: 0.3px; }
    .direction-bar p { font-size: 0.8rem; opacity: 0.7; direction: ltr; margin-top: 2px; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(107,140,62,0.3), 0 0 60px rgba(139,105,20,0.12); }
      50% { box-shadow: 0 0 50px rgba(107,140,62,0.45), 0 0 90px rgba(139,105,20,0.2); }
    }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ===== LOGIN SECTION ===== */
    .login-section {
      min-height: 100vh;
      display: flex;
      direction: ltr;
    }

    /* Left panel — agricultural landscape */
    .login-left {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Sky layer */
    .login-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          #87CEEB 0%,
          #B8D4E3 15%,
          #D4C89E 30%,
          #8B9A3C 40%,
          #6B8C3E 48%,
          #5B7A2F 55%,
          #4A6526 62%,
          #3A5420 70%,
          #2E4318 80%,
          #1F2E10 100%
        );
      z-index: 0;
    }

    /* Sun glow */
    .login-left::after {
      content: '';
      position: absolute;
      top: 8%;
      left: 55%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,220,130,0.5) 0%, rgba(255,200,80,0.2) 35%, transparent 70%);
      border-radius: 50%;
      z-index: 1;
    }

    /* Field rows texture */
    .field-rows {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        repeating-linear-gradient(
          175deg,
          transparent 0px,
          transparent 18px,
          rgba(255,255,255,0.03) 18px,
          rgba(255,255,255,0.03) 20px
        );
      opacity: 0.8;
    }

    /* Mist layer */
    .mist-layer {
      position: absolute;
      bottom: 30%;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.08), transparent);
      z-index: 1;
    }

    /* Hills silhouette */
    .hills {
      position: absolute;
      bottom: 35%;
      left: 0;
      right: 0;
      height: 180px;
      z-index: 1;
    }
    .hills::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -5%;
      width: 60%;
      height: 100%;
      background: radial-gradient(ellipse 100% 100% at 50% 100%, rgba(74,101,38,0.4) 0%, transparent 70%);
    }
    .hills::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: -10%;
      width: 55%;
      height: 80%;
      background: radial-gradient(ellipse 100% 100% at 50% 100%, rgba(58,84,32,0.3) 0%, transparent 70%);
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(30,40,15,0.3) 100%);
      z-index: 2;
    }

    /* Brand content on left */
    .login-brand {
      text-align: center;
      color: #fff;
      position: relative;
      z-index: 10;
      animation: fadeIn 1.2s var(--ease);
    }

    .login-brand-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .login-brand-logo-ring {
      position: relative;
      width: 200px;
      height: 200px;
    }

    /* Pulse ring behind logo */
    .login-brand-logo-ring::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid rgba(107,140,62,0.3);
      animation: pulseRing 3s ease-out infinite;
    }

    .login-brand-logo-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 38%, #FFFDF9 0%, #F0EBE2 50%, #DDD6CC 100%);
      border: 4px solid rgba(107,140,62,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoGlow 4s ease-in-out infinite, float 6s ease-in-out infinite;
      overflow: hidden;
    }

    .login-brand-logo-circle img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      border-radius: 50%;
    }

    .login-brand-name {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 8px;
      text-shadow: 0 4px 24px rgba(0,0,0,0.3);
      letter-spacing: -0.5px;
    }

    .login-brand-sub {
      font-size: 1.15rem;
      font-weight: 400;
      opacity: 0.8;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    /* Right panel — login form */
    .login-right {
      flex: 0 0 42%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 40px;
      position: relative;
    }

    /* Subtle pattern on right panel */
    .login-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(91,122,47,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139,105,20,0.02) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,253,249,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(221,214,204,0.5);
      position: relative;
      z-index: 1;
      animation: fadeSlideUp 0.8s var(--ease) 0.3s both;
    }

    /* Gradient accent line at top of card */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 32px;
      right: 32px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--accent-brown));
      border-radius: 0 0 2px 2px;
    }

    .login-card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: right;
      direction: rtl;
      color: var(--fg);
    }

    .login-card .login-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 36px;
      text-align: right;
      direction: rtl;
    }

    .form-group {
      margin-bottom: 22px;
      direction: rtl;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    .form-group input {
      width: 100%;
      height: 50px;
      padding: 0 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      font-family: 'Rubik', sans-serif;
      font-size: 0.95rem;
      color: var(--fg);
      direction: rtl;
      transition: all 0.25s var(--ease);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(91,122,47,0.1);
      background: #fff;
    }

    .form-group input::placeholder {
      color: #B8B0A5;
    }

    .login-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      direction: rtl;
    }

    .login-remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
    }

    .login-remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .login-forgot a {
      font-size: 0.82rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .login-forgot a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Rubik', sans-serif;
      font-weight: 600;
      transition: all 0.25s var(--ease);
      text-decoration: none;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      height: 50px;
      padding: 0 32px;
      border-radius: var(--radius-md);
      font-size: 1rem;
      box-shadow: 0 4px 16px rgba(91,122,47,0.25);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), #3A5420);
      box-shadow: 0 6px 24px rgba(91,122,47,0.35);
      transform: translateY(-1px);
    }

    .login-submit {
      width: 100%;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      direction: rtl;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-divider span {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .btn-magic {
      width: 100%;
      height: 50px;
      background: var(--card);
      color: var(--fg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .btn-magic:hover {
      background: var(--secondary);
      border-color: var(--primary-light);
    }

    .btn-magic svg {
      width: 18px;
      height: 18px;
    }

    .login-register {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      direction: rtl;
    }

    .login-register a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .login-register a:hover {
      text-decoration: underline;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .login-section {
        flex-direction: column;
      }
      .login-left {
        flex: none;
        min-height: 340px;
      }
      .login-right {
        flex: none;
        padding: 32px 24px;
      }
      .login-brand-logo-circle {
        width: 140px;
        height: 140px;
      }
      .login-brand-logo-circle img {
        width: 120px;
        height: 120px;
      }
      .login-brand-logo-ring {
        width: 140px;
        height: 140px;
      }
      .login-brand-name {
        font-size: 2.2rem;
      }
      .login-card {
        padding: 36px 28px;
      }
    }
  </style>
</head>
<body>

  <h1>Direction A: Adama v2 &#8212; &#x05D0;&#x05D3;&#x05DE;&#x05D4;</h1>
  <p>Premium Enterprise Agricultural Platform</p>
</div>

<!-- Login Section -->
